name: Simhaus Data Sync

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch and save results
        env:
          STRACKER_SESSION: ${{ secrets.STRACKER_SESSION }}
        run: python notifier.py

      - name: Save data files
        run: |
          git config user.name "Simhaus Notifier"
          git config user.email "notifier@simhaus.local"
          git add -f results.json known_bests.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update results [skip ci]"
          git pull --rebase origin main
          git push origin main
